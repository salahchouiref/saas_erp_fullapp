version: '3.8'
services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    ports:
      - '5000:5000'
    environment:
      - MONGO_URI=mongodb://root:example@mongo:27017/saas_ai?authSource=admin
      - JWT_SECRET=supersecretkey
      - NODE_ENV=development
    depends_on:
      - mongo
    command: npm run dev

volumes:
  mongo-data:
